<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitados</title>

  <!-- Si tienes style.css en la raíz pública / dist -->
  <link rel="stylesheet" href="/style.css" />

  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f7f7f7; }
    .wrap { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; }
    thead th { background: #2FBF9A; color: #fff; }
    .slot { font-weight: 700; background: #f2f4f7; padding: 3px 8px; border-radius: 6px; display: inline-block; }
    .owner-cristian { color: #1f6feb; font-weight: 700; text-transform: capitalize; }
    .owner-jesby { color: #d63384; font-weight: 700; text-transform: capitalize; }
    .total { margin-top: 14px; font-weight: 700; text-align: right; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h2>Hola</h2>
      <p>Ingresa la contraseña</p>
      <input
        type="password"
        id="password-input"
        placeholder="Contraseña"
        autocomplete="off"
      />
      <button id="login-button">Entrar</button>
      <p id="login-error" style="display: none;">Contraseña incorrecta</p>
    </div>
  </div>

  <div id="protected-content" style="display: none;">

    <div class="total" id="totalCupos"></div>
  </div>

      total += inv.slot;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${inv.guestName}</td>

      `;
      tbody.appendChild(tr);
    });

    totalCuposEl.textContent = `Total de cupos: ${total}`;
  </script>

  <!-- Si quieres cargar tu JS global de la web -->
  <script type="module" src="/main.js"></script>

</html>
<style>
  #login-screen {
    position: fixed;
    inset: 0;
    background: rgba(255, 248, 244, 0.98);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    background: white;
    padding: 30px 24px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    text-align: center;
    font-family: 'Marcellus', serif;
  }

  .login-box h2 {
    margin-top: 0;
    margin-bottom: 10px;
  }

  .login-box p {
    margin-bottom: 16px;
  }

  #password-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid #d8cfc8;
    border-radius: 10px;
    outline: none;
    box-sizing: border-box;
    margin-bottom: 12px;
  }

  #login-button {
    width: 100%;
    padding: 12px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-family: 'Marcellus', serif;
    background: #c89f94;
    color: white;
  }

  #login-button:hover {
    opacity: 0.92;
  }

  #login-error {
    color: #b42318;
    margin-top: 12px;
    font-size: 14px;
  }
</style>

<script>
  const PASSWORD = "0502";

  const loginScreen = document.getElementById("login-screen");
  const protectedContent = document.getElementById("protected-content");
  const passwordInput = document.getElementById("password-input");
  const loginButton = document.getElementById("login-button");
  const loginError = document.getElementById("login-error");

  function checkPassword() {
    if (passwordInput.value === PASSWORD) {
      loginScreen.style.display = "none";
      protectedContent.style.display = "block";
      sessionStorage.setItem("wedding_access_granted", "true");
    } else {
      loginError.style.display = "block";
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  if (sessionStorage.getItem("wedding_access_granted") === "true") {
    loginScreen.style.display = "none";
    protectedContent.style.display = "block";
  }

  loginButton.addEventListener("click", checkPassword);

  passwordInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      checkPassword();
    }
  });
</script>
